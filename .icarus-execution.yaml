# Shell demo for the BWI Test Hub — CONTAINER execution.
# Declares a runtime PROFILE (never a raw image); the hub maps it to an
# approved image (Alpine/busybox) in its runner-image catalog.
version: 1
name: shell-posix-demo
command:
  argv: ["sh", "run-tests.sh"]
runtime:
  profile: shell-alpine
  required: true
timeout:
  durationSeconds: 120
reportArtifacts:
  - kind: html-report
    path: report
    description: Demo HTML report
  - kind: junit-xml
    path: report/junit.xml
    description: JUnit results
